spring.application.name=auth-service
server.port=8082

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1

spring.datasource.url=jdbc:postgresql://localhost:5433/agri_auth
spring.datasource.username=postgres
spring.datasource.password=123456789

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

pfe.app.jwtSecret=jwtPFESecretKeyMustBeLongerThan32BytesForSecurityReasons
pfe.app.jwtExpiration=86400000
agro.service.base-url=http://localhost:8083
