spring:
  application:
    name: scg-api-gateway

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: localhost
    ip-address: 127.0.0.1

pfe:
  app:
    jwtSecret: jwtPFESecretKeyMustBeLongerThan32BytesForSecurityReasons
